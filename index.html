<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acoustic Tech Simulator v2</title>
    <style>
        body { background: #0f172a; color: #f8fafc; margin: 0; padding: 15px; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        .card { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        canvas { width: 100%; height: 160px; background: #000; border-radius: 4px; display: block; margin-top: 5px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        button { grid-column: span 2; padding: 12px; background: #2dd4bf; color: #000; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <button id="btn">啟動聲學模擬 (Audio Engine)</button>
        <label>振幅 (Amplitude)<input type="range" id="amp" min="0" max="1" step="0.01" value="0.5" style="width:100%"></label>
        <label>頻率 (Hz)<input type="range" id="freq" min="20" max="2000" step="1" value="220" style="width:100%"></label>
    </div>

    <div class="card">
        <div>即時頻率響應 (Real-time Waveform)</div>
        <canvas id="waveCanvas"></canvas>
    </div>

    <div class="card">
        <div>喇叭剖面運動模擬 (Cross-section)</div>
        <canvas id="speakerCanvas"></canvas>
    </div>

    <div class="card">
        <div>空氣粒子疏密 (Compression Waves)</div>
        <canvas id="airCanvas"></canvas>
    </div>
</div>

<script>
    let audioCtx, osc, gainNode;
    const btn = document.getElementById('btn');
    const waveCtx = document.getElementById('waveCanvas').getContext('2d');
    const spkCtx = document.getElementById('speakerCanvas').getContext('2d');
    const airCtx = document.getElementById('airCanvas').getContext('2d');

    // 預先設定音圈與振膜的相對位置，以減少運算
    const SPK_CX = 300; // 喇叭中心 X 軸
    const SPK_CY = 80;  // 喇叭中心 Y 軸
    const CONE_H = 60;  // 錐形振膜高度
    const COIL_H = 20;  // 音圈高度

    btn.onclick = () => {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        osc = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        btn.innerText = "模擬運行中 (Live)";
        btn.style.background = "#555";
    };

    function draw() {
        const amp = parseFloat(document.getElementById('amp').value);
        const freq = parseFloat(document.getElementById('freq').value);
        if (osc) { osc.frequency.value = freq; gainNode.gain.value = amp; }

        const t = Date.now() / 1000;
        const rawVal = Math.sin(t * freq * 0.05) * amp;
        
        // 1. 即時波形
        waveCtx.clearRect(0, 0, 600, 160);
        waveCtx.strokeStyle = '#2dd4bf';
        waveCtx.beginPath();
        for(let x=0; x<600; x++) {
            let y = 80 + Math.sin(x * 0.05 + t * freq * 0.2) * (amp * 50);
            x === 0 ? waveCtx.moveTo(x, y) : waveCtx.lineTo(x, y);
        }
        waveCtx.stroke();

        // 2. 喇叭剖面運動 (新模組)
        spkCtx.clearRect(0, 0, 600, 160);
        
        // --- 繪製固定組件：磁氣迴路 ---
        spkCtx.fillStyle = '#64748b'; // 磁鐵與極板顏色
        // 底板
        spkCtx.fillRect(SPK_CX - 60, SPK_CY + CONE_H + COIL_H / 2, 120, 10);
        // T鐵核心
        spkCtx.fillRect(SPK_CX - 10, SPK_CY + CONE_H / 2, 20, COIL_H + 20);
        // 環形磁鐵
        spkCtx.fillRect(SPK_CX - 60, SPK_CY + CONE_H / 2 + 5, 20, COIL_H + 5);
        spkCtx.fillRect(SPK_CX + 40, SPK_CY + CONE_H / 2 + 5, 20, COIL_H + 5);

        // --- 繪製運動組件：振膜與音圈 (與 rawVal 連動) ---
        const moveOffset = rawVal * 15; // 限制位移幅度

        // 繪製錐形振膜 (Cone)
        spkCtx.fillStyle = '#a1a1aa'; // 鼓紙顏色
        spkCtx.beginPath();
        spkCtx.moveTo(SPK_CX + moveOffset, SPK_CY - CONE_H / 2); // 頂點
        spkCtx.lineTo(SPK_CX - 70, SPK_CY + CONE_H / 2); // 左底
        spkCtx.lineTo(SPK_CX + 70, SPK_CY + CONE_H / 2); // 右底
        spkCtx.fill();

        // 繪製音圈 (Voice Coil) - 模擬磁隙運動
        spkCtx.fillStyle = '#f59e0b'; // 銅線圈顏色
        spkCtx.fillRect(SPK_CX - 15 + moveOffset / 2, SPK_CY + CONE_H / 2, 30, COIL_H);

        // 3. 空氣粒子疏密
        airCtx.clearRect(0, 0, 600, 160);
        airCtx.fillStyle = '#f8fafc';
        for(let i=0; i<20; i++) {
            let x = 50 + i*25 + Math.sin(t*freq*0.05 + i)*rawVal*60;
            airCtx.beginPath();
            airCtx.arc(x, 80, 4, 0, Math.PI*2);
            airCtx.fill();
        }
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
